<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#42b883;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#35495e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e83e8c;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad)"/>
  <!-- Code brackets representing development -->
  <path d="M 30 35 L 25 50 L 30 65" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 70 35 L 75 50 L 70 65" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Small dots representing portfolio items -->
  <circle cx="50" cy="40" r="3" fill="white"/>
  <circle cx="50" cy="50" r="3" fill="white"/>
  <circle cx="50" cy="60" r="3" fill="white"/>
</svg>
